            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--dark-overlay);
            z-index: -1;
        }

        /* Floating particles */
        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: var(--gold);
            border-radius: 50%;
            opacity: 0;
            animation: float 15s infinite;
            box-shadow: 0 0 10px var(--gold);
        }

        @keyframes float {
            0%, 100% {
                transform: translateY(100vh) translateX(0) scale(0);
                opacity: 0;
            }
            10% {
                opacity: 1;
            }
            90% {
                opacity: 1;
            }
            100% {
                transform: translateY(-100vh) translateX(100px) scale(1);
                opacity: 0;
            }
        }

        /* Main container */
        .container {
            text-align: center;
            padding: 2rem;
            position: relative;
            z-index: 1;
            max-width: 1000px;
            width: 90%;
        }

        /* Countdown section */
        .countdown {
            display: flex;
            justify-content: center;
            gap: clamp(1rem, 4vw, 3rem);
            margin: 3rem 0;
            flex-wrap: wrap;
            animation: fadeIn 2s ease-out 0.5s both;
        }

        .time-unit {
            position: relative;
            padding: 2rem;
            min-width: 140px;
            background: rgba(212, 175, 55, 0.08);
            border: 2px solid var(--gold);
            border-radius: 15px;
            box-shadow: 
                0 8px 32px rgba(0, 0, 0, 0.4),
                inset 0 0 20px rgba(212, 175, 55, 0.1),
                0 0 40px rgba(212, 175, 55, 0.15);
            backdrop-filter: blur(10px);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .time-unit:hover {
            transform: translateY(-8px) scale(1.05);
            box-shadow: 
                0 12px 48px rgba(212, 175, 55, 0.3),
                inset 0 0 30px rgba(212, 175, 55, 0.2),
                0 0 60px rgba(212, 175, 55, 0.25);
            border-color: rgba(212, 175, 55, 0.9);
        }

        .time-unit::before {
            content: '';
            position: absolute;
            top: -2px;
            left: -2px;
            right: -2px;
            bottom: -2px;
            background: linear-gradient(135deg, transparent, rgba(212, 175, 55, 0.2), transparent);
            border-radius: 15px;
            opacity: 0;
            transition: opacity 0.4s;
            z-index: -1;
        }

        .time-unit:hover::before {
            opacity: 1;
        }

        .number {
            font-family: 'Cinzel', serif;
            font-size: clamp(3rem, 6vw, 5rem);
            font-weight: 700;
            color: var(--gold);
            text-shadow: 
                0 0 20px rgba(212, 175, 55, 0.5),
                0 4px 20px rgba(0, 0, 0, 0.8);
            display: block;
            margin-bottom: 0.5rem;
            line-height: 1;
        }

        .label {
            font-size: clamp(0.9rem, 2vw, 1.2rem);
            color: var(--warm-white);
            text-transform: uppercase;
            letter-spacing: 0.2em;
            font-weight: 400;
            text-shadow: var(--text-shadow);
        }

        /* Message section */
        .message {
            margin-top: 4rem;
            animation: fadeIn 2.5s ease-out 1s both;
        }

        .message-text {
            font-size: clamp(1.5rem, 4vw, 3rem);
            color: var(--warm-white);
            line-height: 1.8;
            text-shadow: var(--text-shadow);
            font-weight: 600;
            max-width: 800px;
            margin: 0 auto;
            padding: 2rem;
            background: rgba(212, 175, 55, 0.05);
            border-radius: 20px;
            border: 1px solid rgba(212, 175, 55, 0.2);
            backdrop-filter: blur(5px);
            letter-spacing: 0.05em;
        }

        /* Fade in animation */
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Responsive adjustments */
        @media (max-width: 768px) {
            .container {
                padding: 1rem;
            }
            
            .countdown {
                gap: 1rem;
            }
            
            .time-unit {
                min-width: 100px;
                padding: 1.5rem 1rem;
            }
            
            .message-text {
                padding: 1.5rem;
            }
        }

        @media (max-width: 480px) {
            .time-unit {
                min-width: 70px;
                padding: 1rem 0.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="background"></div>
    <div class="overlay"></div>

    <div class="container">
        <div class="countdown">
            <div class="time-unit">
                <span class="number" id="days">00</span>
                <span class="label">Days</span>
            </div>
            <div class="time-unit">
                <span class="number" id="hours">00</span>
                <span class="label">Hours</span>
            </div>
            <div class="time-unit">
                <span class="number" id="minutes">00</span>
                <span class="label">Minutes</span>
            </div>
            <div class="time-unit">
                <span class="number" id="seconds">00</span>
                <span class="label">Seconds</span>
            </div>
        </div>

        <div class="message">
            <p class="message-text">
                Prepare yourself!
            </p>
        </div>
    </div>

    <script>
        // Target date: May 2, 2026 at 20:00 GMT+2 (Eastern European Time)
        const targetDate = new Date('2026-05-02T20:00:00+02:00');

        // Create floating particles
        function createParticles() {
            for (let i = 0; i < 20; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.animationDelay = Math.random() * 15 + 's';
                particle.style.animationDuration = (Math.random() * 10 + 10) + 's';
                document.body.appendChild(particle);
            }
        }

        createParticles();

        function updateCountdown() {
            const now = new Date();
            const difference = targetDate - now;

            if (difference <= 0) {
                document.getElementById('days').textContent = '00';
                document.getElementById('hours').textContent = '00';
                document.getElementById('minutes').textContent = '00';
                document.getElementById('seconds').textContent = '00';
                return;
            }

            const days = Math.floor(difference / (1000 * 60 * 60 * 24));
            const hours = Math.floor((difference % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((difference % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((difference % (1000 * 60)) / 1000);

            document.getElementById('days').textContent = String(days).padStart(2, '0');
            document.getElementById('hours').textContent = String(hours).padStart(2, '0');
            document.getElementById('minutes').textContent = String(minutes).padStart(2, '0');
            document.getElementById('seconds').textContent = String(seconds).padStart(2, '0');
        }

        // Update countdown immediately and then every second
        updateCountdown();
        setInterval(updateCountdown, 1000);
    </script>
</body>
</html>
